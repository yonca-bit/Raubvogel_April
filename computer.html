<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
    </style>
</head>
<body>
    <svg width="400" height="450" viewBox="0 0 400 450" xmlns="http://www.w3.org/2000/svg">

        <!-- MONITOR GEHÄUSE -->
        <rect x="40" y="20" width="320" height="260" rx="12" ry="12" fill="#2a2a2a" />
        <rect x="50" y="30" width="300" height="240" rx="8" ry="8" fill="#1a1a1a" />

        <!-- BILDSCHIRM -->
        <rect x="65" y="45" width="270" height="210" rx="4" ry="4" fill="#111111" />

        <!-- BILDSCHIRM GRÜNER SCHIMMER -->
        <rect x="65" y="45" width="270" height="210" rx="4" ry="4"
              fill="none" stroke="#00ff41" stroke-width="1" opacity="0.3"/>

        <!-- MONITOR FUSS HALS -->
        <rect x="175" y="280" width="50" height="40" fill="#2a2a2a" />

        <!-- MONITOR FUSS BASE -->
        <rect x="130" y="315" width="140" height="18" rx="6" ry="6" fill="#222222" />

        <!-- GEHÄUSE / TOWER -->
        <rect x="80" y="345" width="240" height="90" rx="8" ry="8" fill="#2a2a2a" />
        <rect x="88" y="353" width="224" height="74" rx="6" ry="6" fill="#1f1f1f" />

        <!-- DISKETTEN SCHLITZ -->
        <rect x="100" y="365" width="100" height="14" rx="3" ry="3" fill="#111111" />
        <rect x="102" y="367" width="96" height="10" rx="2" ry="2" fill="#0a0a0a" />

        <!-- CD SCHLITZ -->
        <rect x="100" y="388" width="100" height="8" rx="2" ry="2" fill="#111111" />

        <!-- KNÖPFE -->
        <circle cx="230" cy="365" r="8" fill="#333333" stroke="#444444" stroke-width="1"/>
        <circle cx="230" cy="365" r="4" fill="#00ff41" opacity="0.8"/>

        <circle cx="255" cy="365" r="5" fill="#333333" stroke="#444444" stroke-width="1"/>

        <!-- LÜFTUNGSSCHLITZE -->
        <line x1="280" y1="360" x2="320" y2="360" stroke="#333333" stroke-width="2"/>
        <line x1="280" y1="368" x2="320" y2="368" stroke="#333333" stroke-width="2"/>
        <line x1="280" y1="376" x2="320" y2="376" stroke="#333333" stroke-width="2"/>
        <line x1="280" y1="384" x2="320" y2="384" stroke="#333333" stroke-width="2"/>
        <line x1="280" y1="392" x2="320" y2="392" stroke="#333333" stroke-width="2"/>

        <!-- MONITOR KNOPF -->
        <circle cx="290" cy="265" r="5" fill="#333333" stroke="#444444" stroke-width="1"/>
        <circle cx="305" cy="265" r="3" fill="#333333" stroke="#444444" stroke-width="1"/>

        <!-- BILDSCHIRM REFLEXION -->
        <line x1="75" y1="55" x2="95" y2="55" stroke="#ffffff" stroke-width="1" opacity="0.05"/>
        <line x1="75" y1="60" x2="85" y2="60" stroke="#ffffff" stroke-width="1" opacity="0.05"/>

    </svg>
</body>
</html>
